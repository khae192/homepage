<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board - My Dev Log</title>

  <link rel="stylesheet" href="./css/board.css" />
</head>

<body>

  <div class="window">

    <div class="title-bar">
      📁 Board
    </div>

    <div class="path-bar">
      <span class="path" onclick="goHome()">C:</span>
      <span>\</span>
      <span class="path" onclick="goHome()">Users</span>
      <span>\</span>
      <span class="path" onclick="goHome()">Haeum</span>
      <span>\</span><span class="path highlight" onclick="location.href='board.html'">Board</span>
    </div>

    <div class="container">

      <div class="board-header">
        <h2>📂 게시판</h2>
        <button onclick="openWrite()" class="write-btn">+ 새 파일</button>
      </div>

      <div class="board-list" id="boardList"></div>

    </div>

  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>파일 생성</h3>
      <input type="text" id="title" placeholder="파일 이름" />
      <textarea id="content" placeholder="내용"></textarea>

      <div class="modal-buttons">
        <button onclick="addPost()">생성</button>
        <button onclick="closeWrite()">취소</button>
      </div>
    </div>
  </div>

  <div class="modal" id="viewModal">
    <div class="modal-content file-view">
      <div class="file-header">
        <span>📄</span>
        <h3 id="viewTitle"></h3>
      </div>

      <p class="file-date" id="viewDate"></p>

      <div class="file-content" id="viewContent"></div>

      <div class="modal-buttons">
        <button onclick="deletePost()" class="delete-btn">삭제</button>
        <button onclick="closeView()">닫기</button>
      </div>
    </div>
  </div>

  <script src="./script/board.js"></script>
</body>

</html>
